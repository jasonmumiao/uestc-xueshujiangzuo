name: Update lecture page

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update lecture data
        run: npm run update

      - name: Commit changes
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update lecture schedule"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Worker
        if: steps.commit.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          find dist -name '._*' -delete
          npx wrangler deploy dist --name uestc-lectures-worker --domain xueshujiangzuo.jasonmumiao.online --compatibility-date 2026-06-05
